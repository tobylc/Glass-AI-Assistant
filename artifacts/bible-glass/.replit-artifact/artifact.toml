kind = "web"
previewPath = "/"
title = "Bible for Meta Display"
version = "1.0.0"
id = "artifacts/bible-glass"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20833

[services.development]
run = "pnpm --filter @workspace/bible-glass run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bible-glass", "run", "build" ]
publicDir = "artifacts/bible-glass/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20833"
BASE_PATH = "/"
